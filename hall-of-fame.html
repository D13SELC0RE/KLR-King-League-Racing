<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hall of Fame – King League Racing Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #040408;
      --surface: #0a0a12;
      --card: #0f0f1c;
      --border: #1e1e38;
      --blue: #2979ff;
      --gold: #ffd700;
      --text: #f5f5fa;
      --muted: #7c7c9a;
      --ff-d: 'Barlow Condensed', sans-serif;
      --ff-b: 'Barlow', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-b);
      font-size: 15px;
      line-height: 1.5;
      background-image: linear-gradient(rgba(41,121,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(41,121,255,0.012) 1px, transparent 1px);
      background-size: 32px 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* Fixated Top Navigation Bar Header */
    nav {
      background: rgba(4, 4, 8, 0.92);
      border-bottom: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
    }
    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      height: 72px;
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .nav-logo img { height: 48px; width: 48px; object-fit: contain; }
    .nav-logo-text { font-family: var(--ff-d); font-size: 26px; font-weight: 900; letter-spacing: 3px; color: #fff; text-transform: uppercase; }
    .nav-logo-text span { color: var(--blue); }

    /* Hub Hero Section */
    .hub-hero {
      text-align: center;
      padding: 150px 24px 24px;
      position: relative;
    }
    .hub-hero h1 {
      font-family: var(--ff-d);
      font-size: clamp(42px, 7vw, 72px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -1px;
      line-height: 0.95;
      color: #fff;
    }
    .hub-hero h1 span {
      background: linear-gradient(135deg, #fff 30%, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hub-hero p {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-top: 14px;
      font-weight: 600;
    }

    /* Cinematic Racing Preloader Stage */
    .loader-stage {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 120px;
    }

    .loader-track {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Outer rotating telemetry arc */
    .loader-arc-outer {
      position: absolute;
      inset: 0;
      border: 2px solid transparent;
      border-top-color: var(--gold);
      border-bottom-color: rgba(255, 215, 0, 0.1);
      border-radius: 50%;
      animation: spinClockwise 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /* Inner counter-rotating dashboard arc */
    .loader-arc-inner {
      position: absolute;
      inset: 16px;
      border: 2px solid transparent;
      border-left-color: var(--blue);
      border-right-color: rgba(41, 121, 255, 0.1);
      border-radius: 50%;
      animation: spinCounterClockwise 0.8s linear infinite;
    }

    /* Center ambient status dot */
    .loader-core {
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 20px 4px rgba(255, 255, 255, 0.5), 0 0 40px var(--gold);
      animation: pulseCore 1.5s infinite ease-in-out;
    }

    .loader-status-text {
      margin-top: 32px;
      font-family: var(--ff-d);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #fff;
    }

    .loader-sub-text {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Loading Animations */
    @keyframes spinClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spinCounterClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }

    @keyframes pulseCore {
      0%, 100% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    /* Bottom Checker Strip decoration */
    .checker-strip {
      height: 8px;
      background-image: repeating-linear-gradient(90deg, var(--gold) 0px, var(--gold) 12px, #040408 12px, #040408 24px);
      opacity: 0.25;
    }

    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 28px;
      text-align: center;
    }
    .footer-logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-family: var(--ff-d);
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .footer-logo-wrap img { height: 32px; object-fit: contain; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="images/New%20Project.png" alt="KLR Logo" onerror="this.style.display='none';" />
        <div class="nav-logo-text">Kool League <span>Racing</span></div>
      </a>
    </div>
  </nav>

  <main style="display: flex; flex-direction: column; flex-grow: 1;">
    <div class="hub-hero">
      <h1>KLR HALL OF <span>FAME</span></h1>
      <p>Honoring the absolute champions of Kool League Racing history</p>
    </div>

    <div class="loader-stage">
      <div class="loader-track">
        <div class="loader-arc-outer"></div>
        <div class="loader-arc-inner"></div>
        <div class="loader-core"></div>
      </div>
      <div class="loader-status-text">Awaiting Season Data</div>
      <div class="loader-sub-text">Archiving database for historical statistics...</div>
    </div>
  </main>

  <div class="checker-strip"></div>

  <footer>
    <div class="footer-logo-wrap">
      <img src="images/New%20Project.png" alt="" onerror="this.style.display='none';" />
      <span>Kool League Racing Ecosystem &copy; 2026 · All Rights Reserved</span>
    </div>
  </footer>

</body>
</html>
